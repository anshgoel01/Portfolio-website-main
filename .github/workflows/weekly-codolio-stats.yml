name: Weekly Codolio Stats Update

on:
  schedule:
    - cron: "0 0 * * 0" # weekly (Sun 00:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scrape-codolio.js

      - id: commit-changes
        name: Commit changes and push branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="update-codolio-stats-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add public/codolio-stats.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update Codolio stats [skip ci]"
            git push --set-upstream origin "$BRANCH"
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request if there are changes
        if: steps.commit-changes.outputs.committed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: update-codolio-stats-${{ github.run_id }}
          commit-message: "chore: update Codolio stats [skip ci]"
          title: "chore: update Codolio stats"
          body: |
            This automated PR updates the Codolio stats JSON file.
          labels: automated
